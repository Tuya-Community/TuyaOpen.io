<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>TuyaOpen CMS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/img/favicon.ico" />
</head>
<body>
  <div id="nc-root"></div>

  <script>
    window.CMS_MANUAL_INIT = true;
  </script>

  <script src="https://cdn.jsdelivr.net/npm/decap-cms@3/dist/decap-cms.js"></script>

  <script>
    const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';

    const docFields = [
      { label: 'Title', name: 'title', widget: 'string', i18n: true },
      { label: 'Sidebar Label', name: 'sidebar_label', widget: 'string', required: false, i18n: true },
      { label: 'Sidebar Position', name: 'sidebar_position', widget: 'number', required: false, value_type: 'int', min: 1, i18n: 'duplicate' },
      { label: 'Description', name: 'description', widget: 'text', required: false, i18n: true },
      { label: 'Tags', name: 'tags', widget: 'list', required: false, i18n: true, field: { label: 'Tag', name: 'tag', widget: 'string' } },
      { label: 'Draft', name: 'draft', widget: 'boolean', default: false, required: false, i18n: 'duplicate' },
      { label: 'Body', name: 'body', widget: 'markdown', i18n: true },
    ];

    const blogFields = [
      { label: 'Title', name: 'title', widget: 'string', i18n: true },
      { label: 'Slug', name: 'slug', widget: 'string', required: false, i18n: 'duplicate' },
      { label: 'Authors', name: 'authors', widget: 'list', default: ['tuya'], i18n: true, field: { label: 'Author', name: 'author', widget: 'string' } },
      { label: 'Date', name: 'date', widget: 'datetime', date_format: 'YYYY-MM-DD', time_format: false, required: false, i18n: 'duplicate' },
      { label: 'Image', name: 'image', widget: 'image', required: false, default: '/img/home/tuyaopen-logo-social-preview.png', i18n: 'duplicate' },
      { label: 'Tags', name: 'tags', widget: 'list', default: ['TuyaOpen'], i18n: true, field: { label: 'Tag', name: 'tag', widget: 'string' } },
      { label: 'Draft', name: 'draft', widget: 'boolean', default: false, required: false, i18n: 'duplicate' },
      { label: 'Unlisted', name: 'unlisted', widget: 'boolean', default: false, required: false, i18n: 'duplicate' },
      { label: 'Body', name: 'body', widget: 'markdown', i18n: true },
    ];

    const projectFields = [
      { label: 'Title', name: 'title', widget: 'string', i18n: true },
      { label: 'Sidebar Label', name: 'sidebar_label', widget: 'string', required: false, i18n: true },
      { label: 'Sidebar Position', name: 'sidebar_position', widget: 'number', required: false, value_type: 'int', min: 1, i18n: 'duplicate' },
      { label: 'Description', name: 'description', widget: 'text', required: false, i18n: true },
      { label: 'Tags', name: 'tags', widget: 'list', required: false, i18n: true, field: { label: 'Tag', name: 'tag', widget: 'string' } },
      { label: 'Image', name: 'image', widget: 'image', required: false, i18n: 'duplicate' },
      { label: 'Draft', name: 'draft', widget: 'boolean', default: false, required: false, i18n: 'duplicate' },
      { label: 'Body', name: 'body', widget: 'markdown', i18n: true },
    ];

    window.CMS.init({
      config: {
        load_config_file: false,
        backend: isLocal
          ? { name: 'git-gateway' }
          : {
              name: 'github',
              repo: 'Tuya-Community/TuyaOpen.io',
              branch: 'master',
              base_url: 'https://tuyaopen.ai',
              auth_endpoint: '/oauth/auth',
              app_id: 'Ov23li0MAyFEPdgrMMwm',
              squash_merges: true,
            },
        local_backend: isLocal,
        publish_mode: isLocal ? undefined : 'editorial_workflow',

        site_url: 'https://tuyaopen.ai',
        display_url: 'https://tuyaopen.ai',
        logo_url: '/img/home/tuyaopen-logo-dark.png',

        media_folder: 'static/img',
        public_folder: '/img',

        slug: {
          encoding: 'ascii',
          clean_accents: true,
          sanitize_replacement: '-',
        },

        i18n: {
          structure: 'multiple_folders',
          locales: ['en', 'zh'],
          default_locale: 'en',
        },

        collections: [
          {
            name: 'docs',
            label: 'Documentation',
            label_singular: 'Doc Page',
            folder: 'docs',
            create: true,
            delete: true,
            i18n: true,
            nested: { depth: 100, summary: '{{title}}' },
            slug: '{{slug}}',
            summary: '{{title}}',
            meta: { path: { widget: 'string', label: 'Path', index_file: 'index' } },
            sortable_fields: ['title', 'sidebar_position'],
            view_filters: [
              { label: 'Drafts', field: 'draft', pattern: true },
            ],
            fields: docFields,
          },
          {
            name: 'blog',
            label: 'Blog',
            label_singular: 'Blog Post',
            folder: 'blog',
            create: true,
            delete: true,
            i18n: true,
            slug: '{{year}}-{{month}}-{{day}}-{{slug}}',
            summary: '{{title}} — {{year}}/{{month}}/{{day}}',
            sortable_fields: ['title', 'date'],
            view_filters: [
              { label: 'Drafts', field: 'draft', pattern: true },
            ],
            fields: blogFields,
          },
          {
            name: 'projects',
            label: 'Projects',
            label_singular: 'Project',
            folder: 'docs/projects',
            create: true,
            delete: true,
            i18n: true,
            slug: '{{year}}-{{month}}-{{day}}-{{slug}}',
            summary: '{{title}} — {{year}}/{{month}}/{{day}}',
            sortable_fields: ['title'],
            fields: projectFields,
          },
        ],
      },
    });
  </script>
</body>
</html>
