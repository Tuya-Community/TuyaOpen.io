upstream feedback_backend {
  server 127.0.0.1:7744;
  keepalive 32;
}

server {
    # listen [::]:443 ssl http2 accept_filter=dataready;  # for FreeBSD
    # listen 443 ssl http2 accept_filter=dataready;  # for FreeBSD
    listen [::]:443 ssl ;
    listen 443 ssl;
    http2 on;

    # The host names to respond to
    server_name tuyaopen.ai www.tuyaopen.ai docs.tuyaopen.ai;

    include h5bp/tls/ssl_engine.conf;
    #include h5bp/tls/certificate_files.conf;
    ssl_certificate /etc/nginx/certs/_tuyaopen_ai.crt;
    ssl_certificate_key /etc/nginx/certs/_tuyaopen_ai.key;
    include h5bp/tls/policy_balanced.conf;

    # Custom error pages
    include h5bp/errors/custom_errors.conf;

    # Include the basic h5bp config set
    include h5bp/basic.conf;

    # Common proxy headers for all proxy locations
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;

    # ===== SPECIFIC PATHS (BEFORE catch-all) =====

    location /webhook/ {
        proxy_pass http://127.0.0.1:9000/;
    }

    # Decap CMS OAuth server (GitHub auth flow)
    location /oauth/ {
        proxy_pass http://127.0.0.1:9070/oauth/;
    }

    # /tools/* previously proxied to the standalone web-serial docker (port 9060).
    # That tool is now integrated into the Docusaurus site at /web-serial, and the
    # docker has been retired. /tools/* falls through to the catch-all below
    # (Docusaurus on :9050), where plugin-client-redirects maps /tools -> /web-serial
    # and /tools/tyutool -> /tyutool.

    # ===== FEEDBACK SERVICE -- one proxy; all routing/auth/cache lives in the app =====
    # Every /api/tuyaopen-ide/* route (feedback upload, download, report, reports
    # list, cases board, pending, render, health) is handled by the backend. The
    # backend enforces HTTP methods, Basic Auth, and Cache-Control itself, so
    # nginx stays minimal. proxy_pass with no URI passes the full path unchanged
    # (no prefix strip); the backend accepts both /foo and /api/tuyaopen-ide/foo.
    location /api/tuyaopen-ide/ {
        proxy_pass http://feedback_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        client_max_body_size 100M;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_request_buffering off;
    }

    # ===== CATCH-ALL (LAST) =====

    location / {
        proxy_pass http://127.0.0.1:9050;
    }
}
